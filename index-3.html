<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mera Assistant</title>
  <meta name="description" content="Aapka Personal AI Assistant" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mera Assistant" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(15,15,30,0.9);
      --border: #2a2a3e;
      --text: #e0e0ff;
      --muted: #666688;
      --accent: #a78bfa;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #0f0a1a 50%, #0a0f1a 100%);
      min-height: 100vh;
      font-family: 'Noto Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      padding-bottom: 0;
    }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(70px); opacity: 0.12; pointer-events: none; z-index: 0; }
    .orb1 { width: 250px; height: 250px; background: #7c3aed; top: 5%; left: 5%; animation: fl1 7s ease-in-out infinite alternate; }
    .orb2 { width: 200px; height: 200px; background: #0ea5e9; top: 55%; left: 65%; animation: fl2 9s ease-in-out infinite alternate; }
    .orb3 { width: 180px; height: 180px; background: #10b981; top: 30%; left: 40%; animation: fl3 11s ease-in-out infinite alternate; }
    @keyframes fl1 { to { transform: translate(30px, 40px); } }
    @keyframes fl2 { to { transform: translate(-40px, -20px); } }
    @keyframes fl3 { to { transform: translate(20px, -30px); } }

    .container { width: 100%; max-width: 680px; position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    .header { text-align: center; padding: 16px 0 10px; }
    .header-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .bot-icon { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #0ea5e9); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 18px rgba(124,58,237,0.45); }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    .subtitle { color: var(--muted); font-size: 11px; margin-top: 3px; }

    /* Modes */
    .modes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
    .mode-btn { padding: 7px 14px; border-radius: 24px; border: 1px solid var(--border); background: #1a1a2e; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .mode-btn.active { color: var(--accent); border-color: #a78bfa66; background: rgba(167,139,250,0.12); box-shadow: 0 0 14px rgba(167,139,250,0.2); }

    /* Chat box */
    .chat-box { flex: 1; background: var(--surface); border-radius: 18px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(20px); box-shadow: 0 16px 50px rgba(0,0,0,0.5); margin-bottom: 16px; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #3f3f60; border-radius: 4px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: slideUp 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #0ea5e9); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }

    .bubble { max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; }
    .bubble.bot { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.user { background: rgba(167,139,250,0.2); border: 1px solid #a78bfa44; border-bottom-right-radius: 4px; }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; align-items: center; padding: 10px 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }

    /* Quick prompts */
    .quick-bar { padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #1a1a2e; }
    .quick-btn { padding: 4px 10px; border-radius: 14px; border: 1px solid #a78bfa44; background: transparent; color: var(--accent); font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.2s; opacity: 0.75; }
    .quick-btn:hover { opacity: 1; transform: translateY(-1px); }

    /* Input */
    .input-area { padding: 12px 14px; border-top: 1px solid #1a1a2e; display: flex; gap: 8px; align-items: flex-end; }
    textarea { flex: 1; padding: 10px 14px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid #a78bfa44; color: var(--text); font-family: inherit; font-size: 14px; resize: none; line-height: 1.5; caret-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { outline: none; border-color: #a78bfa88; }

    .icon-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; transition: all 0.2s; flex-shrink: 0; }
    .mic-btn { background: rgba(255,255,255,0.07); }
    .mic-btn.listening { background: #ef4444; box-shadow: 0 0 18px #ef444466; animation: micPulse 1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
    .send-btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); box-shadow: 0 0 14px #a78bfa44; }
    .send-btn:disabled { background: rgba(255,255,255,0.05); box-shadow: none; opacity: 0.4; cursor: not-allowed; }

    .footer { text-align: center; color: #333355; font-size: 10px; padding: 8px 0 12px; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="container">
    <div class="header">
      <div class="header-row">
        <div class="bot-icon">🤖</div>
        <h1>Mera Assistant</h1>
      </div>
      <div class="subtitle">General • Business • Study • Daily Tasks</div>
    </div>

    <div class="modes" id="modes">
      <button class="mode-btn active" data-mode="general" data-color="#a78bfa" onclick="setMode(this)">💬 General</button>
      <button class="mode-btn" data-mode="business" data-color="#34d399" onclick="setMode(this)">💼 Business</button>
      <button class="mode-btn" data-mode="study" data-color="#60a5fa" onclick="setMode(this)">📚 Study</button>
      <button class="mode-btn" data-mode="tasks" data-color="#f97316" onclick="setMode(this)">✅ Tasks</button>
    </div>

    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="msg">
          <div class="avatar">🤖</div>
          <div class="bubble bot">Salaam! 👋 Main aapka personal assistant hoon. Aaj main aapki kaise madad kar sakta hoon?</div>
        </div>
      </div>

      <div class="quick-bar" id="quickBar"></div>

      <div class="input-area">
        <textarea id="inputBox" rows="1" placeholder="💬 Kuch bhi poochein..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="icon-btn mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>

    <div class="footer">Enter dabao bhejne ke liye • Shift+Enter new line</div>
  </div>

  <script>
    const QUICK = {
      general: ["Koi acchi kahani sunao", "Life advice do", "Aaj ka plan karo"],
      business: ["Professional email likho", "Meeting agenda banao", "Business idea evaluate karo"],
      study: ["Photosynthesis explain karo", "Study schedule banao", "Concept samjhao"],
      tasks: ["Subah ki routine banao", "To-do list banao", "Week plan karo"],
    };

    const SYSTEM = `Aap ek helpful personal assistant hain. Aap Hinglish mein baat karte hain (Hindi + English mix). 
Aap in cheezon mein help karte hain:
1. General Q&A - koi bhi sawaal
2. Business/Work - emails, planning, decisions
3. Study Help - concepts explain karna, notes banana
4. Daily Tasks - reminders, to-do lists, schedules
Aap friendly, conversational aur concise hain. Bullet points use karein jab helpful ho.`;

    let mode = "general";
    let history = [];
    let listening = false;
    let recognition = null;

    function setMode(btn) {
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      mode = btn.dataset.mode;
      renderQuick();
    }

    function renderQuick() {
      const bar = document.getElementById("quickBar");
      bar.innerHTML = QUICK[mode].map(q =>
        `<button class="quick-btn" onclick="sendMessage('${q.replace(/'/g,"\\'")}')">${q}</button>`
      ).join("");
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
      document.getElementById("sendBtn").disabled = !el.value.trim();
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = "msg" + (role === "user" ? " user" : "");
      div.innerHTML = role === "user"
        ? `<div class="bubble user">${text}</div>`
        : `<div class="avatar">🤖</div><div class="bubble bot">${text}</div>`;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg"; div.id = "typing";
      div.innerHTML = `<div class="avatar">🤖</div><div class="bubble bot"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    function hideTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendMessage(text) {
      const box = document.getElementById("inputBox");
      const userText = text || box.value.trim();
      if (!userText) return;

      addMsg("user", userText);
      history.push({ role: "user", content: `[Mode: ${mode}] ${userText}` });

      box.value = ""; box.style.height = "auto";
      document.getElementById("sendBtn").disabled = true;
      showTyping();

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: SYSTEM,
            messages: history,
          }),
        });
        const data = await res.json();
        const reply = data.content?.[0]?.text || "Kuch masla ho gaya, dobara try karein.";
        history.push({ role: "assistant", content: reply });
        hideTyping();
        addMsg("bot", reply);
      } catch {
        hideTyping();
        addMsg("bot", "⚠️ Network error. Dobara try karein.");
      }
    }

    function toggleMic() {
      const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Rec) { alert("Browser voice support nahi karta. Chrome use karein."); return; }
      if (listening) { recognition?.stop(); return; }
      recognition = new Rec();
      recognition.lang = "hi-IN";
      recognition.onstart = () => { listening = true; document.getElementById("micBtn").classList.add("listening"); document.getElementById("micBtn").textContent = "⏹️"; };
      recognition.onresult = e => {
        document.getElementById("inputBox").value = e.results[0][0].transcript;
        autoResize(document.getElementById("inputBox"));
      };
      recognition.onend = () => { listening = false; document.getElementById("micBtn").classList.remove("listening"); document.getElementById("micBtn").textContent = "🎤"; };
      recognition.start();
    }

    renderQuick();
  </script>
</body>
</html>
